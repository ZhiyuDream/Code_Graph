# Conda 环境示例（需 conda 时由您本机创建）
# 创建: conda create -n code_graph python=3.11
# 激活: conda activate code_graph
# 安装: pip install -r requirements.txt
#
# 若系统未安装 libclang 动态库，可任选其一：
#   conda install -c conda-forge libclang
#   或使用系统 clang：sudo apt install libclang-14-dev 等，并设置环境变量
#     export LIBCLANG_PATH=/usr/lib/llvm-14/lib/libclang.so.1  # 路径按本机调整
